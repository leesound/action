name: NodeLoc 论坛自动签到脚本

on:
  workflow_dispatch:     # 手动触发
  schedule:
    - cron: "0 1 * * *"  # 每天 UTC 01:00（北京时间 09:00）

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f nodeloc/requirements.txt ]; then pip install -r nodeloc/requirements.txt; fi

      - name: 安装 Chrome 浏览器
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 执行签到脚本
        env:
          NL_COOKIE: ${{ secrets.NL_COOKIE }}
        run: |
          cd nodeloc
          python main.py
