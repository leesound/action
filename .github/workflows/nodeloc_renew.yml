# .github/workflows/nodeloc_renew.yml
name: NodeLoc 每日签到

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 北京时间 06:00
  workflow_dispatch:
    inputs:
      debug:
        description: '调试模式（保存截图）'
        required: false
        default: 'false'
        type: boolean

jobs:
  签到:
    name: 执行签到
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Chrome 浏览器
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 安装 Python 依赖
        run: pip install undetected-chromedriver selenium

      - name: 执行签到脚本
        env:
          NL_ACCOUNT: ${{ secrets.NL_ACCOUNT }}
        run: python nodeloc/main.py

      - name: 上传调试截图
        if: failure() || github.event.inputs.debug == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: 调试截图
          path: /tmp/*.png
          retention-days: 3
          if-no-files-found: ignore
