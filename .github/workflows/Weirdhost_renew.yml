name: WeirdHost 自动续期

on:
  schedule:
    # 每天 UTC 0:00 和 12:00 运行（北京时间 8:00 和 20:00）
    - cron: '0 0,12 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install playwright aiohttp pynacl
          playwright install chromium
          playwright install-deps chromium

      - name: 运行续期脚本
        env:
          WEIRDHOST_COOKIE: ${{ secrets.WEIRDHOST_COOKIE }}
          WEIRDHOST_SERVER_URL: ${{ secrets.WEIRDHOST_SERVER_URL }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/weirdhost_renew.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: "*.png"
          retention-days: 3
          if-no-files-found: ignore
