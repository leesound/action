name: WeirdHost Renew

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth x11-utils
      
      - name: Install Python dependencies
        run: |
          pip install seleniumbase pynacl pyvirtualdisplay
          seleniumbase install chromedriver
      
      - name: Setup SSH tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no -f -N -D 1080 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT || 22 }}
          sleep 3
          echo "SOCKS_PROXY=socks5://127.0.0.1:1080" >> $GITHUB_ENV
      
      - name: Run renewal script
        env:
          WEIRDHOST_COOKIE: ${{ secrets.WEIRDHOST_COOKIE }}
          WEIRDHOST_ID: ${{ secrets.WEIRDHOST_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: python scripts/weirdhost_renew.py
      
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            *.png
          retention-days: 3
