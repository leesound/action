# ACCOUNTS ж јејҸиҜҰи§Ј
# еҚ•иҙҰеҸ·еӨҡVPSпјҡuser:password:179:жҙӣжқүзҹ¶VPS,180:дёңдә¬VPS,181:йҰҷжёҜVPS
# еӨҡиҙҰеҸ·пјҲжҚўиЎҢеҲҶйҡ”пјүпјҡ
# user1:password1:179:жҙӣжқүзҹ¶VPS,180:дёңдә¬VPS
# user2:password2:185:жөӢиҜ•жңә
# user3:password3:190:еӨҮз”Ёжңә,191:ејҖеҸ‘жңә

name: ArcticCloud иҮӘеҠЁз»ӯжңҹ

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: з»ӯжңҹ VPS
        run: |
          cat << 'EOF' > renew.js
          const https = require('https');
          const { URL } = require('url');

          const ACCOUNTS = process.env.ACCOUNTS;
          const TG_BOT_TOKEN = process.env.TELEGRAM_BOT_TOKEN;
          const TG_CHAT_ID = process.env.TELEGRAM_CHAT_ID;

          const BASE_URL = 'https://vps.polarbear.nyc.mn';

          // и·іиҝҮ SSL иҜҒд№ҰйӘҢиҜҒ
          const agent = new https.Agent({ rejectUnauthorized: false });

          function maskUsername(username) {
            if (username.length <= 2) return '***';
            return username[0] + '*'.repeat(username.length - 2) + username[username.length - 1];
          }

          function request(url, options = {}) {
            return new Promise((resolve, reject) => {
              const u = new URL(url);
              const req = https.request(url, {
                method: options.method || 'GET',
                agent: u.hostname === 'vps.polarbear.nyc.mn' ? agent : undefined,
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'zh-CN,zh;q=0.9',
                  ...options.headers
                }
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve({
                  status: res.statusCode,
                  headers: res.headers,
                  body: data
                }));
              });
              
              req.on('error', reject);
              if (options.body) req.write(options.body);
              req.end();
            });
          }

          async function sendTelegram(message) {
            if (!TG_BOT_TOKEN || !TG_CHAT_ID) return;
            try {
              await request(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  chat_id: TG_CHAT_ID,
                  text: message,
                  parse_mode: 'Markdown'
                })
              });
            } catch (e) {
              console.log('Telegram еҸ‘йҖҒеӨұиҙҘ:', e.message);
            }
          }

          function parseAccounts(str) {
            const accounts = [];
            const lines = str.trim().split('\n');
            
            for (const line of lines) {
              if (!line.trim()) continue;
              const parts = line.split(':');
              if (parts.length < 4) continue;
              
              const username = parts[0].trim();
              const password = parts[1].trim();
              const vpsListStr = parts.slice(2).join(':');
              
              const vpsList = [];
              const vpsItems = vpsListStr.split(',');
              for (const item of vpsItems) {
                const [id, name] = item.split(':');
                if (id && name) {
                  vpsList.push({ id: id.trim(), name: name.trim() });
                }
              }
              
              if (vpsList.length > 0) {
                accounts.push({ username, password, vpsList });
              }
            }
            return accounts;
          }

          async function renewAccount(account, forLog = false) {
            const displayName = forLog ? maskUsername(account.username) : account.username;
            let log = `\nрҹ‘Ө *иҙҰеҸ·: ${displayName}*\n`;

            try {
              const loginResp = await request(`${BASE_URL}/index/login/`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/x-www-form-urlencoded',
                  'Origin': BASE_URL,
                  'Referer': `${BASE_URL}/index/login/`
                },
                body: `swapname=${encodeURIComponent(account.username)}&swappass=${encodeURIComponent(account.password)}`
              });

              const location = loginResp.headers.location || '';
              const setCookie = loginResp.headers['set-cookie'] || [];
              const cookieStr = Array.isArray(setCookie) ? setCookie.join('; ') : setCookie;

              if (location.includes('error=')) {
                const error = decodeURIComponent(location.match(/error=([^&]+)/)?.[1] || 'жңӘзҹҘ');
                log += `вқҢ зҷ»еҪ•еӨұиҙҘ: ${error}\n`;
                return log;
              }

              const uuidMatch = /swapuuid=([^;]+)/.exec(cookieStr);
              if (!uuidMatch) {
                log += `вқҢ зҷ»еҪ•еӨұиҙҘ: жңӘиҺ·еҸ–еҮӯиҜҒ\n`;
                return log;
              }

              const swapuuid = uuidMatch[1];
              log += `вң… зҷ»еҪ•жҲҗеҠҹ\n`;

              for (const vps of account.vpsList) {
                const renewResp = await request(`${BASE_URL}/control/detail/${vps.id}/pay/`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Cookie': `swapuuid=${swapuuid}`,
                    'Origin': BASE_URL,
                    'Referer': `${BASE_URL}/control/detail/${vps.id}/`
                  }
                });

                const renewLocation = renewResp.headers.location || '';
                const successMatch = renewLocation.match(/success=([^&]+)/);
                const errorMatch = renewLocation.match(/error=([^&]+)/);

                if (successMatch) {
                  log += `  вң… ${vps.name}: ${decodeURIComponent(successMatch[1])}\n`;
                } else if (errorMatch) {
                  log += `  вқҢ ${vps.name}: ${decodeURIComponent(errorMatch[1])}\n`;
                } else {
                  log += `  вқ“ ${vps.name}: зҠ¶жҖҒз Ғ ${renewResp.status}\n`;
                }
              }

            } catch (err) {
              log += `вқҢ ејӮеёё: ${err.message}\n`;
            }

            return log;
          }

          async function main() {
            const timeStr = new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'});
            
            if (!ACCOUNTS) {
              const msg = `рҹҗ» *ArcticCloud VPS з»ӯжңҹ*\nрҹ•’ ${timeStr}\n\nвқҢ ACCOUNTS жңӘи®ҫзҪ®`;
              console.log(msg.replace(/\*/g, ''));
              await sendTelegram(msg);
              return;
            }

            const accounts = parseAccounts(ACCOUNTS);
            
            if (accounts.length === 0) {
              const msg = `рҹҗ» *ArcticCloud VPS з»ӯжңҹ*\nрҹ•’ ${timeStr}\n\nвқҢ ACCOUNTS ж јејҸй”ҷиҜҜ`;
              console.log(msg.replace(/\*/g, ''));
              await sendTelegram(msg);
              return;
            }

            let logMsg = `рҹҗ» *ArcticCloud VPS з»ӯжңҹ*\nрҹ•’ ${timeStr}\n\nрҹ“Ҡ е…ұ ${accounts.length} дёӘиҙҰеҸ·\n`;
            let tgMsg = logMsg;

            for (const account of accounts) {
              logMsg += await renewAccount(account, true);   // ж—Ҙеҝ—йҡҗи—ҸиҙҰеҸ·
              tgMsg += await renewAccount(account, false);   // йҖҡзҹҘжҳҫзӨәиҙҰеҸ·
            }

            logMsg += '\nвң… д»»еҠЎе®ҢжҲҗ';
            tgMsg += '\nвң… д»»еҠЎе®ҢжҲҗ';

            console.log(logMsg.replace(/\*/g, ''));
            await sendTelegram(tgMsg);
          }

          main();
          EOF
          node renew.js
        env:
          ACCOUNTS: ${{ secrets.ARCTICCLOUD_ACCOUNTS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
